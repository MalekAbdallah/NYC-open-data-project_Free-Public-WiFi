<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width">

<title>NYC WiFi Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<link href="style.css" rel="stylesheet">
<script src="script.js"></script>
</head>

<body>

<div id="banner" class="container center">
<h1>NYC WiFi Map</h1>
</div>

<div class="container subbanner">
<p>Enter a latitude and longitude to view a location on the map.</p>
</div>

<div class="container">

<input type="text" id="lat" placeholder="Enter Latitude">

<input type="text" id="lon" placeholder="Enter Longitude">

<a class="button" onclick="displayLocation()">View Location</a>

<a class="button" onclick="initMap()">Show All WiFi Hotspots</a>

</div>

<div id="output" class="container">
<div id="map"></div>
</div>

<div id="footer" class="container center">
<h3>NYC Open Data Project</h3>
<a class="button" href="home.html">Back Home</a>
</div>

</body>
</html>
