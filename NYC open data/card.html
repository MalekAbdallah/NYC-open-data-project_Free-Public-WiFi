<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>WiFi Hotspots with map</title>

    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <link href="style.css" rel="stylesheet" type="text/css" />
    
    <script src="helper.js"></script>
    <script src="script.js"></script>
  </head>

  <body onload="init()">

    <div id="banner" class="container center">
      <h1>WiFi Hotspots - Location Map</h1>
    </div>

    <div class="container subbanner">
      <div>
        <p>
          This shows hotspot location and info
        </p>
        <h4>
          The latitude and longitude information of a WiFi hotspot retrieved from NYC Open Data.
        </h4>
      </div>
    </div>

    <div class="container">

  <div>
    <input type="text" id="location" placeholder="Enter location">
    <a class="button" onclick="filterByLocation()">Search Location</a>
  </div>

  <div>
    <input type="text" id="provider" placeholder="Enter provider">
    <a class="button" onclick="filterByProvider()">Search Provider</a>
  </div>

  <div>
    <input type="text" id="multiLocation" placeholder="Enter location">
    <input type="text" id="multiProvider" placeholder="Enter provider">
    <a class="button" onclick="filterMultiple()">Search Multiple</a>
  </div>

</div>

    <div id="output" class="container">
      <div id="leftPanel" class="container"></div>

     
      <div id="map"></div>
    </div>

   <div id="footer" class="container center">
<h3>WiFi Hotspot Project</h3>
<a class="button" href="index.html">Home</a>
<a class="button" href="analysis.html">Charts</a>
  </div>


  </body>
</html>
